<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produkt - Grupp 10</title>
    <link rel="icon" type="image/x-icon" href="cart.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-amber-50 text-gray-900">
    <header class="sticky top-0 z-40 border-b-4 border-black bg-yellow-300">
      <div
        class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8"
      >
        <div>
          <a href="index.html">
            <h1 class="text-3xl font-black tracking-tight text-red-600">
              Grupp 10s webbshop
            </h1>
            <p class="mt-1 text-sm font-medium text-gray-800">
              Säljer allt viktigt DU behöver!
            </p>
          </a>
        </div>

        <div class="flex items-center gap-3">
          <a
            href="./index.html"
            class="inline-flex items-center rounded-2xl border-4 border-black bg-white px-4 py-2 text-sm font-bold text-black shadow-[4px_4px_0_0_#000] transition hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-none"
          >
            ← Tillbaka
          </a>

          <div class="relative"></div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <section
        class="rounded-3xl border-4 border-black bg-white p-6 shadow-[8px_8px_0_0_#000]"
      >
        <div id="product-detail"></div>
      </section>

      <section
        class="mt-8 rounded-3xl border-4 border-black bg-white p-6 shadow-[8px_8px_0_0_#000]"
      >
        <h2 class="text-2xl font-black text-blue-600">
          Senast visade produkter
        </h2>

        <div
          id="recent-products"
          class="mt-4 grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-5"
        ></div>
      </section>
    </main>

    <script type="module" src="./js/product.js"></script>
  </body>
</html>
