<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grupp 10</title>
    <link rel="icon" type="image/x-icon" href="cart.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-amber-50 text-gray-900">
    <header class="sticky top-0 z-40 border-b-4 border-black bg-yellow-300">
      <div
        class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8"
      >
        <div>
          <a href="index.html">
            <h1 class="text-3xl font-black tracking-tight text-red-600">
              Grupp 10s webbshop
            </h1>
            <p class="mt-1 text-sm font-medium text-gray-800">
              Säljer allt viktigt DU behöver!
            </p>
          </a>
        </div>

        <div class="relative"></div>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <section
        class="rounded-3xl border-4 border-black bg-white p-6 shadow-[8px_8px_0_0_#000]"
      >
        <div class="flex flex-col gap-6">
          <div>
            <h2 class="text-2xl font-black text-blue-600">Kategorier</h2>
            <div id="category-list" class="mt-4 flex flex-wrap gap-3"></div>
          </div>

          <div>
            <h2 class="text-2xl font-black text-red-600">Produkter</h2>
            <div
              id="product-list"
              class="mt-4 grid grid-cols-1 gap-6 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"
            ></div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
